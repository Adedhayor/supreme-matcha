<?xml version="1.0" encoding="UTF-8"?>
<!-- Colorway: Pink Cloud -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900&amp;family=Italianno&amp;family=Jost:wght@300;400;500&amp;display=swap');
    </style>

    <!-- Matcha gradient for liquid -->
    <linearGradient id="matchaGradient" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7BA05B"/>
      <stop offset="60%" stop-color="#7BA05B"/>
      <stop offset="100%" stop-color="#B6D89C"/>
    </linearGradient>

    <!-- Milk foam gradient -->
    <linearGradient id="foamGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="100%" stop-color="#F4F9EF"/>
    </linearGradient>

    <!-- Glass highlight gradient -->
    <linearGradient id="glassHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Clip path for cup fill -->
    <clipPath id="cupClip">
      <path d="M 1360,1280 L 1320,1760 Q 1315,1800 1340,1820 L 1660,1820 Q 1685,1800 1680,1760 L 1640,1280 Z"/>
    </clipPath>

    <!-- Drop shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3D2B1F" flood-opacity="0.08"/>
    </filter>

    <!-- Sparkle filter -->
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 1: Hashtag heading                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="hashtag">
    <text
      x="1500" y="460"
      font-family="'Playfair Display', Georgia, serif"
      font-weight="900"
      font-size="220"
      fill="#7BA05B"
      text-anchor="middle"
      letter-spacing="8"
    >#IkeMide26</text>

    <!-- Thin decorative rule below hashtag -->
    <line x1="900" y1="510" x2="2100" y2="510" stroke="#B6D89C" stroke-width="3" stroke-linecap="round"/>
    <!-- Diamond accents on rule -->
    <polygon points="1500,502 1510,510 1500,518 1490,510" fill="#C9A84C"/>
    <polygon points="900,502 907,510 900,518 893,510" fill="#B6D89C"/>
    <polygon points="2100,502 2107,510 2100,518 2093,510" fill="#B6D89C"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 2: Decorative top elements                  -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="top-decor">
    <!-- Cherry blossom branch – left -->
    <g id="branch-left" opacity="0.85">
      <!-- Main branch -->
      <path d="M 820,620 Q 900,700 1000,760 Q 1060,800 1120,840" stroke="#D4C5A9" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Sub-branch up -->
      <path d="M 950,730 Q 970,690 1010,670" stroke="#D4C5A9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Leaves -->
      <ellipse cx="1010" cy="670" rx="22" ry="11" fill="#7BA05B" transform="rotate(-30,1010,670)"/>
      <!-- Blossoms -->
      <g id="blossom-l1" transform="translate(880,660)">
        <circle cx="0" cy="-14" r="9" fill="#F5CDD8"/>
        <circle cx="13" cy="-5" r="9" fill="#F5CDD8"/>
        <circle cx="8" cy="10" r="9" fill="#F5CDD8"/>
        <circle cx="-8" cy="10" r="9" fill="#F5CDD8"/>
        <circle cx="-13" cy="-5" r="9" fill="#F5CDD8"/>
        <circle cx="0" cy="0" r="7" fill="#C9A84C"/>
      </g>
      <g id="blossom-l2" transform="translate(1000,755)">
        <circle cx="0" cy="-10" r="7" fill="#F5CDD8"/>
        <circle cx="10" cy="-3" r="7" fill="#F5CDD8"/>
        <circle cx="6" cy="8" r="7" fill="#F5CDD8"/>
        <circle cx="-6" cy="8" r="7" fill="#F5CDD8"/>
        <circle cx="-10" cy="-3" r="7" fill="#F5CDD8"/>
        <circle cx="0" cy="0" r="5" fill="#C9A84C"/>
      </g>
      <!-- Fallen petals -->
      <ellipse cx="1110" cy="860" rx="7" ry="4" fill="#F5CDD8" transform="rotate(20,1110,860)" opacity="0.7"/>
      <ellipse cx="1070" cy="880" rx="6" ry="3.5" fill="#F5CDD8" transform="rotate(-10,1070,880)" opacity="0.6"/>
    </g>

    <!-- Cherry blossom branch – right (mirror) -->
    <g id="branch-right" opacity="0.85" transform="translate(3000,0) scale(-1,1)">
      <path d="M 820,620 Q 900,700 1000,760 Q 1060,800 1120,840" stroke="#D4C5A9" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M 950,730 Q 970,690 1010,670" stroke="#D4C5A9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="1010" cy="670" rx="22" ry="11" fill="#7BA05B" transform="rotate(-30,1010,670)"/>
      <g transform="translate(880,660)">
        <circle cx="0" cy="-14" r="9" fill="#F5CDD8"/>
        <circle cx="13" cy="-5" r="9" fill="#F5CDD8"/>
        <circle cx="8" cy="10" r="9" fill="#F5CDD8"/>
        <circle cx="-8" cy="10" r="9" fill="#F5CDD8"/>
        <circle cx="-13" cy="-5" r="9" fill="#F5CDD8"/>
        <circle cx="0" cy="0" r="7" fill="#C9A84C"/>
      </g>
      <g transform="translate(1000,755)">
        <circle cx="0" cy="-10" r="7" fill="#F5CDD8"/>
        <circle cx="10" cy="-3" r="7" fill="#F5CDD8"/>
        <circle cx="6" cy="8" r="7" fill="#F5CDD8"/>
        <circle cx="-6" cy="8" r="7" fill="#F5CDD8"/>
        <circle cx="-10" cy="-3" r="7" fill="#F5CDD8"/>
        <circle cx="0" cy="0" r="5" fill="#C9A84C"/>
      </g>
      <ellipse cx="1110" cy="860" rx="7" ry="4" fill="#F5CDD8" transform="rotate(20,1110,860)" opacity="0.7"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 3: Matcha latte cup (center illustration)   -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="matcha-cup" filter="url(#softShadow)">

    <!-- Straw -->
    <rect x="1545" y="900" width="18" height="340" rx="9" fill="#B6D89C"/>
    <rect x="1545" y="900" width="9" height="340" rx="4" fill="#D4E8C2" opacity="0.6"/>

    <!-- Cup opening ellipse (top rim) -->
    <ellipse cx="1500" cy="1280" rx="160" ry="30" fill="#E2F0D6" stroke="#7BA05B" stroke-width="4"/>

    <!-- Glass cup body (trapezoid) -->
    <path d="M 1360,1280 L 1320,1760 Q 1315,1800 1340,1820 L 1660,1820 Q 1685,1800 1680,1760 L 1640,1280 Z"
      fill="white" fill-opacity="0.15" stroke="#7BA05B" stroke-width="5" stroke-linejoin="round"/>

    <!-- Matcha liquid fill (clipped) -->
    <g clip-path="url(#cupClip)">
      <!-- Full matcha fill -->
      <rect x="1310" y="1430" width="390" height="400" fill="url(#matchaGradient)"/>
      <!-- Foam layer on top of matcha -->
      <ellipse cx="1500" cy="1435" rx="178" ry="22" fill="url(#foamGradient)"/>
    </g>

    <!-- Latte art heart (on foam) -->
    <g id="latte-heart" transform="translate(1500, 1435)">
      <path d="M 0,10 C 0,10 -45,-35 -45,-55 C -45,-75 -20,-85 0,-65 C 20,-85 45,-75 45,-55 C 45,-35 0,10 0,10 Z"
        fill="#FDF8F0" opacity="0.85"/>
    </g>

    <!-- Glass highlight (left side shine) -->
    <path d="M 1365,1300 L 1330,1760 Q 1326,1796 1348,1816"
      stroke="url(#glassHighlight)" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Bottom ellipse / base -->
    <ellipse cx="1500" cy="1820" rx="160" ry="22" fill="#D4C5A9" opacity="0.5"/>

    <!-- Steam wisps -->
    <g id="steam" opacity="0.35">
      <path d="M 1430,1220 Q 1410,1170 1430,1120 Q 1450,1070 1430,1020"
        stroke="#7BA05B" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 1500,1200 Q 1480,1150 1500,1100 Q 1520,1050 1500,1000"
        stroke="#7BA05B" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M 1570,1220 Q 1550,1170 1570,1120 Q 1590,1070 1570,1020"
        stroke="#7BA05B" stroke-width="6" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 4: Decorative elements around cup           -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="cup-decor">

    <!-- Sparkles (four-pointed stars) -->
    <!-- Large sparkle – upper left of cup -->
    <g id="sparkle-1" transform="translate(1200, 1180)" filter="url(#sparkleGlow)">
      <polygon points="0,-20 4,-4 20,0 4,4 0,20 -4,4 -20,0 -4,-4" fill="#C9A84C"/>
      <polygon points="0,-10 2,-2 10,0 2,2 0,10 -2,2 -10,0 -2,-2" fill="#E8C547" opacity="0.7"/>
    </g>
    <!-- Medium sparkle – upper right of cup -->
    <g id="sparkle-2" transform="translate(1820, 1150)" filter="url(#sparkleGlow)">
      <polygon points="0,-16 3.5,-3.5 16,0 3.5,3.5 0,16 -3.5,3.5 -16,0 -3.5,-3.5" fill="#C9A84C"/>
    </g>
    <!-- Small sparkles scattered -->
    <polygon points="1140,1500 1146,1494 1152,1500 1146,1506" fill="#C9A84C" opacity="0.9"/>
    <polygon points="1870,1380 1876,1374 1882,1380 1876,1386" fill="#C9A84C" opacity="0.8"/>
    <polygon points="1260,1720 1268,1712 1276,1720 1268,1728" fill="#C9A84C"/>
    <polygon points="1750,1700 1756,1694 1762,1700 1756,1706" fill="#7BA05B" opacity="0.7"/>
    <polygon points="1850,1580 1858,1572 1866,1580 1858,1588" fill="#C9A84C" opacity="0.8"/>
    <polygon points="1120,1320 1128,1312 1136,1320 1128,1328" fill="#C9A84C"/>

    <!-- Small glitter dots -->
    <circle cx="1190" cy="1400" r="5" fill="#C9A84C" opacity="0.6"/>
    <circle cx="1800" cy="1460" r="4" fill="#C9A84C" opacity="0.7"/>
    <circle cx="1170" cy="1620" r="3" fill="#7BA05B" opacity="0.5"/>
    <circle cx="1840" cy="1620" r="5" fill="#C9A84C" opacity="0.6"/>

    <!-- Ribbon bow – left of cup -->
    <g id="bow-left" transform="translate(1200, 1520)">
      <!-- Left loop -->
      <ellipse cx="-32" cy="-12" rx="36" ry="18" fill="#C9A84C" transform="rotate(-20,-32,-12)"/>
      <!-- Right loop -->
      <ellipse cx="32" cy="-12" rx="36" ry="18" fill="#C9A84C" transform="rotate(20,32,-12)"/>
      <!-- Knot -->
      <circle cx="0" cy="0" r="10" fill="#C9A84C"/>
      <!-- Ribbon tails -->
      <path d="M -8,8 Q -20,40 -30,55" stroke="#C9A84C" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M 8,8 Q 20,40 30,55" stroke="#C9A84C" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Ribbon bow – right of cup -->
    <g id="bow-right" transform="translate(1810, 1540)">
      <ellipse cx="-32" cy="-12" rx="36" ry="18" fill="#C9A84C" transform="rotate(-20,-32,-12)"/>
      <ellipse cx="32" cy="-12" rx="36" ry="18" fill="#C9A84C" transform="rotate(20,32,-12)"/>
      <circle cx="0" cy="0" r="10" fill="#C9A84C"/>
      <path d="M -8,8 Q -20,40 -30,55" stroke="#C9A84C" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M 8,8 Q 20,40 30,55" stroke="#C9A84C" stroke-width="7" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Tiny leaf sprigs -->
    <g id="sprig-left" transform="translate(1070, 1620)" opacity="0.75">
      <path d="M 0,0 Q -18,-30 -10,-55 Q 5,-35 0,0" fill="#7BA05B"/>
      <path d="M 0,0 Q 18,-28 8,-52" stroke="#7BA05B" stroke-width="2" fill="none"/>
      <path d="M 0,0 Q -30,-20 -35,5" fill="#B6D89C"/>
      <path d="M 0,0 Q 25,-15 28,8" fill="#B6D89C"/>
    </g>
    <g id="sprig-right" transform="translate(1930, 1640) scale(-1,1)" opacity="0.75">
      <path d="M 0,0 Q -18,-30 -10,-55 Q 5,-35 0,0" fill="#7BA05B"/>
      <path d="M 0,0 Q 18,-28 8,-52" stroke="#7BA05B" stroke-width="2" fill="none"/>
      <path d="M 0,0 Q -30,-20 -35,5" fill="#B6D89C"/>
      <path d="M 0,0 Q 25,-15 28,8" fill="#B6D89C"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 5: Tagline                                  -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="tagline">
    <text
      x="1500" y="2040"
      font-family="'Italianno', 'Dancing Script', cursive"
      font-size="230"
      fill="#C9A84C"
      text-anchor="middle"
    >BRIDE ♡</text>

    <!-- Thin decorative rule below tagline -->
    <line x1="960" y1="2075" x2="2040" y2="2075" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

    <!-- est. 2026 -->
    <text
      x="1500" y="2155"
      font-family="'Jost', sans-serif"
      font-weight="300"
      font-size="72"
      fill="#C9A84C"
      text-anchor="middle"
      letter-spacing="18"
      opacity="0.75"
    >est. 2026</text>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 6: Bottom decorative elements               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g id="bottom-decor">
    <!-- Small heart cluster -->
    <g transform="translate(1500, 2260)" opacity="0.6">
      <circle cx="-12" cy="-6" r="7" fill="#C9A84C"/>
      <circle cx="0" cy="-6" r="7" fill="#C9A84C"/>
      <path d="M -19,0 Q -6,18 0,22 Q 6,18 19,0" fill="#C9A84C"/>
    </g>

    <!-- Additional sparkles bottom area -->
    <polygon points="1100,2200 1106,2194 1112,2200 1106,2206" fill="#C9A84C" opacity="0.6"/>
    <polygon points="1900,2180 1907,2173 1914,2180 1907,2187" fill="#C9A84C" opacity="0.6"/>
    <circle cx="1280" cy="2230" r="4" fill="#C9A84C" opacity="0.5"/>
    <circle cx="1720" cy="2220" r="4" fill="#C9A84C" opacity="0.5"/>
  </g>

</svg>
