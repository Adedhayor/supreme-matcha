<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&amp;family=Jost:wght@300;400;500&amp;display=swap');
    </style>

    <!-- Arc path for textPath -->
    <path id="hashtagArc" d="M 200,1400 Q 1500,500 2800,1400" fill="none"/>
    <!-- Lower gentle arc for tagline -->
    <path id="taglineArc" d="M 400,1720 Q 1500,1920 2600,1720" fill="none"/>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur" in="SourceGraphic"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CONCEPT B2 — ARCHED TYPOGRAPHIC LOCKUP              -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- SECTION 1: Arched hashtag text -->
  <g id="arched-hashtag">
    <!-- Outer glow / shadow text on arc -->
    <text font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="260"
      fill="#B6D89C" filter="url(#textGlow)" opacity="0.5">
      <textPath href="#hashtagArc" startOffset="50%" text-anchor="middle" letter-spacing="18">
        #IkeMide26
      </textPath>
    </text>
    <!-- Main text on arc -->
    <text font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="260"
      fill="#4A6741">
      <textPath href="#hashtagArc" startOffset="50%" text-anchor="middle" letter-spacing="18">
        #IkeMide26
      </textPath>
    </text>
  </g>

  <!-- SECTION 2: Center composition — matcha leaf + rule system -->
  <g id="center-lockup" transform="translate(1500, 1560)">
    <!-- Wide rule with diamond endpoints -->
    <line x1="-520" y1="0" x2="-90" y2="0" stroke="#7BA05B" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="520" y2="0" stroke="#7BA05B" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-540,-7 -520,0 -540,7 -560,0" fill="#7BA05B"/>
    <polygon points="540,-7 560,0 540,7 520,0" fill="#7BA05B"/>

    <!-- Matcha leaf center mark (larger) -->
    <g id="arch-leaf-mark" transform="scale(1.4)">
      <path d="M 0,-52 Q 34,-22 30,10 Q 24,40 0,52 Q -24,40 -30,10 Q -34,-22 0,-52 Z"
        fill="#7BA05B"/>
      <line x1="0" y1="-44" x2="0" y2="42" stroke="#4A6741" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M 0,-8 Q 18,4 24,14" stroke="#4A6741" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M 0,-8 Q -18,4 -24,14" stroke="#4A6741" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M 0,16 Q 15,24 20,32" stroke="#4A6741" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
      <path d="M 0,16 Q -15,24 -20,32" stroke="#4A6741" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
    </g>

    <!-- Blush diamond accents -->
    <polygon points="-80,-7 -68,0 -80,7 -92,0" fill="#E8A0B4"/>
    <polygon points="80,-7 92,0 80,7 68,0" fill="#E8A0B4"/>
  </g>

  <!-- SECTION 3: Arched tagline (gentle downward arc) -->
  <g id="arched-tagline">
    <text font-family="'Jost', sans-serif" font-weight="300" font-size="88"
      fill="#2C2C2C">
      <textPath href="#taglineArc" startOffset="50%" text-anchor="middle" letter-spacing="20">
        the perfect matcha ♡
      </textPath>
    </text>
  </g>

  <!-- Scattered sparkles matching the arch energy -->
  <!-- Upper arc sparkles -->
  <polygon points="310,760 318,752 326,760 318,768" fill="#C9A84C" opacity="0.8"/>
  <polygon points="550,500 558,492 566,500 558,508" fill="#E8A0B4" opacity="0.7"/>
  <polygon points="2450,500 2458,492 2466,500 2458,508" fill="#E8A0B4" opacity="0.7"/>
  <polygon points="2690,760 2698,752 2706,760 2698,768" fill="#C9A84C" opacity="0.8"/>
  <circle cx="430" cy="630" r="5" fill="#E8A0B4" opacity="0.6"/>
  <circle cx="2570" cy="630" r="5" fill="#E8A0B4" opacity="0.6"/>
  <!-- Lower sparkles -->
  <polygon points="950,1940 958,1932 966,1940 958,1948" fill="#C9A84C" opacity="0.6"/>
  <polygon points="2050,1940 2058,1932 2066,1940 2058,1948" fill="#C9A84C" opacity="0.6"/>
  <circle cx="1500" cy="2020" r="5" fill="#E8A0B4" opacity="0.5"/>

</svg>
